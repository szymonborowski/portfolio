<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" font-family="monospace" font-size="13">
  <style>
    .bg        { fill: #ffffff }
    .box       { fill: #f1f5f9 }
    .line      { stroke: #94a3b8; stroke-width: 1.5; fill: none }
    .c-blue    { stroke: #2563eb }
    .c-green   { stroke: #16a34a }
    .c-orange  { stroke: #ea580c }
    .c-purple  { stroke: #7c3aed }
    .t-blue    { fill: #1d4ed8 }
    .t-green   { fill: #15803d }
    .t-orange  { fill: #c2410c }
    .t-purple  { fill: #6d28d9 }
    .t-muted   { fill: #64748b }

    @media (prefers-color-scheme: dark) {
      .bg        { fill: #1e1e2e }
      .box       { fill: #313244 }
      .line      { stroke: #585b70 }
      .c-blue    { stroke: #89b4fa }
      .c-green   { stroke: #a6e3a1 }
      .c-orange  { stroke: #fab387 }
      .c-purple  { stroke: #cba6f7 }
      .t-blue    { fill: #89b4fa }
      .t-green   { fill: #a6e3a1 }
      .t-orange  { fill: #fab387 }
      .t-purple  { fill: #cba6f7 }
      .t-muted   { fill: #a6adc8 }
    }
  </style>

  <rect width="600" height="420" class="bg" rx="8"/>

  <!-- Traefik -->
  <rect x="220" y="20" width="120" height="60" class="box c-blue" stroke-width="1.5" rx="6"/>
  <text x="280" y="44" text-anchor="middle" class="t-blue" font-weight="bold">Traefik</text>
  <text x="280" y="60" text-anchor="middle" class="t-muted" font-size="11">(reverse proxy)</text>

  <!-- Connector lines -->
  <line x1="280" y1="80"  x2="280" y2="110" class="line"/>
  <line x1="50"  y1="110" x2="510" y2="110" class="line"/>
  <line x1="50"  y1="110" x2="50"  y2="150" class="line"/>
  <line x1="165" y1="110" x2="165" y2="150" class="line"/>
  <line x1="280" y1="110" x2="280" y2="150" class="line"/>
  <line x1="395" y1="110" x2="395" y2="150" class="line"/>
  <line x1="510" y1="110" x2="510" y2="150" class="line"/>

  <!-- Services row -->
  <rect x="5"   y="150" width="90" height="60" class="box c-green" stroke-width="1.5" rx="6"/>
  <text x="50"  y="174" text-anchor="middle" class="t-green" font-weight="bold">Frontend</text>
  <text x="50"  y="190" text-anchor="middle" class="t-muted" font-size="11">+ Redis</text>

  <rect x="120" y="150" width="90" height="60" class="box c-green" stroke-width="1.5" rx="6"/>
  <text x="165" y="184" text-anchor="middle" class="t-green" font-weight="bold">SSO</text>

  <rect x="235" y="150" width="90" height="60" class="box c-green" stroke-width="1.5" rx="6"/>
  <text x="280" y="184" text-anchor="middle" class="t-green" font-weight="bold">Admin</text>

  <rect x="350" y="150" width="90" height="60" class="box c-green" stroke-width="1.5" rx="6"/>
  <text x="395" y="184" text-anchor="middle" class="t-green" font-weight="bold">Users</text>

  <rect x="465" y="150" width="90" height="60" class="box c-green" stroke-width="1.5" rx="6"/>
  <text x="510" y="184" text-anchor="middle" class="t-green" font-weight="bold">Blog</text>

  <!-- Users + Blog → RabbitMQ -->
  <line x1="395" y1="210" x2="395" y2="260" class="line"/>
  <line x1="510" y1="210" x2="510" y2="240" class="line"/>
  <line x1="395" y1="260" x2="510" y2="260" class="line"/>
  <line x1="452" y1="260" x2="452" y2="280" class="line"/>

  <!-- RabbitMQ -->
  <rect x="320" y="280" width="265" height="55" class="box c-orange" stroke-width="1.5" rx="6"/>
  <text x="452" y="312" text-anchor="middle" class="t-orange" font-weight="bold">RabbitMQ</text>

  <!-- RabbitMQ → Analytics -->
  <line x1="452" y1="335" x2="452" y2="360" class="line"/>

  <!-- Analytics -->
  <rect x="320" y="360" width="265" height="50" class="box c-purple" stroke-width="1.5" rx="6"/>
  <text x="452" y="381" text-anchor="middle" class="t-purple" font-weight="bold">Analytics</text>
  <text x="452" y="397" text-anchor="middle" class="t-muted" font-size="11">(consumers)</text>
</svg>
