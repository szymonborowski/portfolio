# =============================================================================
# Production Docker Compose - Portfolio Microservices
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================

# Logging reusable block — json-file, 10 MB × 3 pliki
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./infra/dynamic/:/etc/traefik/dynamic/:ro
      - ./infra/certs:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${NETWORK_NAME}"
      - "--providers.file.filename=/etc/traefik/dynamic/traefik_dynamic.yml"
      - "--providers.file.watch=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--ping=true"
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.50'
        reservations:
          memory: 64m
    networks:
      - web
      - microservices

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(`${RABBITMQ_DOMAIN}`)"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls=true"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    networks:
      - microservices
      - web

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.25'
        reservations:
          memory: 128m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    networks:
      - microservices
      - web

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - microservices
      - web

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./infra/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.10'
        reservations:
          memory: 32m
    networks:
      - microservices

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - microservices
      - web

  # ===========================================================================
  # FRONTEND
  # ===========================================================================

  frontend-app:
    image: ghcr.io/szymonborowski/portfolio-frontend:latest
    restart: unless-stopped
    environment:
      APP_NAME: ${FRONTEND_APP_NAME}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${FRONTEND_DOMAIN}
      APP_KEY: ${FRONTEND_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: frontend-db
      DB_PORT: "3306"
      DB_DATABASE: ${FRONTEND_DB_DATABASE}
      DB_USERNAME: ${FRONTEND_DB_USERNAME}
      DB_PASSWORD: ${FRONTEND_DB_PASSWORD}
      REDIS_HOST: frontend-redis
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      SSO_URL: ${FRONTEND_SSO_URL}
      SSO_API_URL_INTERNAL: ${FRONTEND_SSO_API_URL_INTERNAL}
      SSO_CLIENT_ID: ${FRONTEND_SSO_CLIENT_ID}
      SSO_CLIENT_SECRET: ${FRONTEND_SSO_CLIENT_SECRET}
      BLOG_API_URL_INTERNAL: ${FRONTEND_BLOG_API_URL_INTERNAL}
      USERS_API_URL_INTERNAL: ${FRONTEND_USERS_API_URL_INTERNAL}
      USERS_INTERNAL_API_KEY: ${USERS_INTERNAL_API_KEY}
      ANALYTICS_API_URL_INTERNAL: ${FRONTEND_ANALYTICS_API_URL_INTERNAL}
      ANALYTICS_INTERNAL_API_KEY: ${ANALYTICS_INTERNAL_API_KEY}
      MAIL_MAILER: smtp
      MAIL_SCHEME: smtps
      MAIL_HOST: ssl0.ovh.net
      MAIL_PORT: "465"
      MAIL_USERNAME: ${FRONTEND_MAIL_USERNAME}
      MAIL_PASSWORD: ${FRONTEND_MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${FRONTEND_MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${FRONTEND_MAIL_FROM_NAME}
      MAIL_CONTACT_TO: ${FRONTEND_MAIL_CONTACT_TO}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
    volumes:
      - frontend_public:/var/www/html/public
    depends_on:
      frontend-redis:
        condition: service_healthy
    expose:
      - "9000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    networks:
      - frontend-internal
      - microservices

  frontend-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - frontend_public:/var/www/html/public:ro
      - ./infra/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      frontend-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 16m
    networks:
      - frontend-internal
      - web

  frontend-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - frontend_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.10'
        reservations:
          memory: 32m
    networks:
      - frontend-internal

  frontend-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${FRONTEND_DB_DATABASE}
      MYSQL_USER: ${FRONTEND_DB_USERNAME}
      MYSQL_PASSWORD: ${FRONTEND_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${FRONTEND_DB_ROOT_PASSWORD}
    volumes:
      - frontend_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 256m
    networks:
      - frontend-internal

  # ===========================================================================
  # SSO
  # ===========================================================================

  sso-app:
    image: ghcr.io/szymonborowski/portfolio-sso:latest
    restart: unless-stopped
    environment:
      APP_NAME: ${SSO_APP_NAME}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${SSO_DOMAIN}
      APP_KEY: ${SSO_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: sso-db
      DB_PORT: "3306"
      DB_DATABASE: ${SSO_DB_DATABASE}
      DB_USERNAME: ${SSO_DB_USERNAME}
      DB_PASSWORD: ${SSO_DB_PASSWORD}
      USERS_API_URL_INTERNAL: ${SSO_USERS_API_URL_INTERNAL}
      USERS_SERVICE_API_KEY: ${USERS_INTERNAL_API_KEY}
    volumes:
      - sso_public:/var/www/html/public
    depends_on:
      sso-db:
        condition: service_healthy
    expose:
      - "9000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    networks:
      - sso-internal
      - microservices

  sso-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - sso_public:/var/www/html/public:ro
      - ./infra/nginx/sso.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sso.rule=Host(`${SSO_DOMAIN}`)"
      - "traefik.http.routers.sso.entrypoints=websecure"
      - "traefik.http.routers.sso.tls=true"
      - "traefik.http.services.sso.loadbalancer.server.port=80"
    depends_on:
      sso-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 16m
    networks:
      - sso-internal
      - web
      - microservices

  sso-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${SSO_DB_DATABASE}
      MYSQL_USER: ${SSO_DB_USERNAME}
      MYSQL_PASSWORD: ${SSO_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${SSO_DB_ROOT_PASSWORD}
    volumes:
      - sso_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 256m
    networks:
      - sso-internal

  # ===========================================================================
  # ADMIN
  # ===========================================================================

  admin-app:
    image: ghcr.io/szymonborowski/portfolio-admin:latest
    restart: unless-stopped
    environment:
      APP_NAME: ${ADMIN_APP_NAME}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${ADMIN_DOMAIN}
      APP_KEY: ${ADMIN_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: admin-db
      DB_PORT: "3306"
      DB_DATABASE: ${ADMIN_DB_DATABASE}
      DB_USERNAME: ${ADMIN_DB_USERNAME}
      DB_PASSWORD: ${ADMIN_DB_PASSWORD}
      USERS_API_URL_INTERNAL: ${ADMIN_USERS_API_URL_INTERNAL}
      USERS_SERVICE_API_KEY: ${USERS_INTERNAL_API_KEY}
      SSO_URL: ${ADMIN_SSO_URL}
      SSO_INTERNAL_URL: ${ADMIN_SSO_INTERNAL_URL}
      SSO_CLIENT_ID: ${ADMIN_SSO_CLIENT_ID}
      SSO_CLIENT_SECRET: ${ADMIN_SSO_CLIENT_SECRET}
      SSO_REDIRECT_URI: ${ADMIN_SSO_REDIRECT_URI}
      ANALYTICS_API_URL_INTERNAL: http://analytics-nginx
      ANALYTICS_INTERNAL_API_KEY: ${ANALYTICS_INTERNAL_API_KEY}
    volumes:
      - admin_public:/var/www/html/public
    depends_on:
      admin-db:
        condition: service_healthy
    expose:
      - "9000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    networks:
      - admin-internal
      - microservices

  admin-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - admin_public:/var/www/html/public:ro
      - ./infra/nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    depends_on:
      admin-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 16m
    networks:
      - admin-internal
      - web

  admin-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${ADMIN_DB_DATABASE}
      MYSQL_USER: ${ADMIN_DB_USERNAME}
      MYSQL_PASSWORD: ${ADMIN_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ADMIN_DB_ROOT_PASSWORD}
    volumes:
      - admin_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 256m
    networks:
      - admin-internal

  # ===========================================================================
  # USERS
  # ===========================================================================

  users-app:
    image: ghcr.io/szymonborowski/portfolio-users:latest
    restart: unless-stopped
    environment:
      APP_NAME: ${USERS_APP_NAME}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${USERS_DOMAIN}
      APP_KEY: ${USERS_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: users-db
      DB_PORT: "3306"
      DB_DATABASE: ${USERS_DB_DATABASE}
      DB_USERNAME: ${USERS_DB_USERNAME}
      DB_PASSWORD: ${USERS_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      INTERNAL_API_KEY: ${USERS_INTERNAL_API_KEY}
    volumes:
      - users_public:/var/www/html/public
    depends_on:
      users-db:
        condition: service_healthy
    expose:
      - "9000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    networks:
      - users-internal
      - microservices

  users-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - users_public:/var/www/html/public:ro
      - ./infra/nginx/users.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.users.rule=Host(`${USERS_DOMAIN}`)"
      - "traefik.http.routers.users.entrypoints=websecure"
      - "traefik.http.routers.users.tls=true"
      - "traefik.http.services.users.loadbalancer.server.port=80"
    depends_on:
      users-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 16m
    networks:
      - users-internal
      - web
      - microservices

  users-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${USERS_DB_DATABASE}
      MYSQL_USER: ${USERS_DB_USERNAME}
      MYSQL_PASSWORD: ${USERS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${USERS_DB_ROOT_PASSWORD}
    volumes:
      - users_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 256m
    networks:
      - users-internal

  # ===========================================================================
  # BLOG
  # ===========================================================================

  blog-app:
    image: ghcr.io/szymonborowski/portfolio-blog:latest
    restart: unless-stopped
    environment:
      APP_NAME: ${BLOG_APP_NAME}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${BLOG_DOMAIN}
      APP_KEY: ${BLOG_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: blog-db
      DB_PORT: "3306"
      DB_DATABASE: ${BLOG_DB_DATABASE}
      DB_USERNAME: ${BLOG_DB_USERNAME}
      DB_PASSWORD: ${BLOG_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
    volumes:
      - blog_public:/var/www/html/public
    depends_on:
      blog-db:
        condition: service_healthy
    expose:
      - "9000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    networks:
      - blog-internal
      - microservices

  blog-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - blog_public:/var/www/html/public:ro
      - ./infra/nginx/blog.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blog.rule=Host(`${BLOG_DOMAIN}`)"
      - "traefik.http.routers.blog.entrypoints=websecure"
      - "traefik.http.routers.blog.tls=true"
      - "traefik.http.services.blog.loadbalancer.server.port=80"
    depends_on:
      blog-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 16m
    networks:
      - blog-internal
      - web
      - microservices

  blog-consumer:
    image: ghcr.io/szymonborowski/portfolio-blog:latest
    restart: unless-stopped
    command: php artisan rabbitmq:consume-users
    environment:
      APP_NAME: ${BLOG_APP_NAME}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${BLOG_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: blog-db
      DB_PORT: "3306"
      DB_DATABASE: ${BLOG_DB_DATABASE}
      DB_USERNAME: ${BLOG_DB_USERNAME}
      DB_PASSWORD: ${BLOG_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
    depends_on:
      blog-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - blog-internal
      - microservices

  blog-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${BLOG_DB_DATABASE}
      MYSQL_USER: ${BLOG_DB_USERNAME}
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${BLOG_DB_ROOT_PASSWORD}
    volumes:
      - blog_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 256m
    networks:
      - blog-internal

  # ===========================================================================
  # ANALYTICS
  # ===========================================================================

  analytics-app:
    image: ghcr.io/szymonborowski/portfolio-analytics:latest
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: analytics-db
      DB_PORT: "3306"
      DB_DATABASE: ${ANALYTICS_DB_DATABASE}
      DB_USERNAME: ${ANALYTICS_DB_USERNAME}
      DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      INTERNAL_API_KEY: ${ANALYTICS_INTERNAL_API_KEY}
    volumes:
      - analytics_public:/var/www/html/public
    depends_on:
      analytics-db:
        condition: service_healthy
    expose:
      - "9000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 128m
    networks:
      - analytics-internal
      - microservices

  analytics-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - analytics_public:/var/www/html/public:ro
      - ./infra/nginx/analytics.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      analytics-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
        reservations:
          memory: 16m
    networks:
      - analytics-internal
      - microservices

  analytics-consumer:
    image: ghcr.io/szymonborowski/portfolio-analytics:latest
    restart: unless-stopped
    command: php artisan rabbitmq:consume-views
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: analytics-db
      DB_PORT: "3306"
      DB_DATABASE: ${ANALYTICS_DB_DATABASE}
      DB_USERNAME: ${ANALYTICS_DB_USERNAME}
      DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      INTERNAL_API_KEY: ${ANALYTICS_INTERNAL_API_KEY}
    depends_on:
      analytics-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 64m
    networks:
      - analytics-internal
      - microservices

  analytics-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${ANALYTICS_DB_DATABASE}
      MYSQL_USER: ${ANALYTICS_DB_USERNAME}
      MYSQL_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ANALYTICS_DB_ROOT_PASSWORD}
    volumes:
      - analytics_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
        reservations:
          memory: 256m
    networks:
      - analytics-internal

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  web:
    name: ${NETWORK_NAME}
    driver: bridge
  microservices:
    name: microservices
    driver: bridge
  frontend-internal:
    driver: bridge
  sso-internal:
    driver: bridge
  admin-internal:
    driver: bridge
  users-internal:
    driver: bridge
  blog-internal:
    driver: bridge
  analytics-internal:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  rabbitmq_data:
  prometheus_data:
  loki_data:
  grafana_data:
  frontend_public:
  frontend_redis_data:
  frontend_db_data:
  sso_public:
  sso_db_data:
  admin_public:
  admin_db_data:
  users_public:
  users_db_data:
  blog_public:
  blog_db_data:
  analytics_public:
  analytics_db_data:
