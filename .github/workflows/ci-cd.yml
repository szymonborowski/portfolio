name: CI/CD

on:
  push:
    branches: [ master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [admin, blog, frontend, sso, users, analytics]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/portfolio-${{ matrix.service }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"
          # On semver tag push (v1.2.3) also tag with the version
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF##*/}"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
          fi
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "sha_tag=${IMAGE}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Check for Dockerfile
        id: dockerfile
        run: |
          DF=""
          if [ -f "${{ matrix.service }}/docker/deploy/php/Dockerfile" ]; then DF="${{ matrix.service }}/docker/deploy/php/Dockerfile"; fi
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then DF="${{ matrix.service }}/Dockerfile"; fi
          if [ -f "${{ matrix.service }}/docker/Dockerfile" ]; then DF="${{ matrix.service }}/docker/Dockerfile"; fi
          if [ -n "$DF" ]; then echo "found=true" >> $GITHUB_OUTPUT; echo "path=$DF" >> $GITHUB_OUTPUT; else echo "found=false" >> $GITHUB_OUTPUT; fi

      - name: Run PHP tests (if present)
        run: |
          if [ -f "${{ matrix.service }}/src/artisan" ]; then
            sudo apt-get update -y
            sudo apt-get install -y php-cli php-zip unzip git
            cd "${{ matrix.service }}/src"
            if [ -f composer.json ]; then composer install --no-interaction --no-progress --prefer-dist || true; fi
            if [ -f phpunit.xml ] || [ -d tests ]; then php artisan test || true; fi
          else
            echo "no php app detected in ${{ matrix.service }}"
          fi

      - name: Log into GitHub Container Registry
        if: steps.dockerfile.outputs.found == 'true'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.dockerfile.outputs.found == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kustomize
        if: steps.dockerfile.outputs.found == 'true' && github.event_name == 'push'
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Update image tag for ArgoCD
        if: steps.dockerfile.outputs.found == 'true' && github.event_name == 'push'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          IMAGE: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.sha_tag }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e

          # Each service lives in its own repo: szymonborowski/{service}_service
          SERVICE_REPO="szymonborowski/${{ matrix.service }}_service"
          OVERLAY_PATH="k8s/overlays/prod"

          # Clone the service repo using PAT
          git clone "https://x-access-token:${GH_PAT}@github.com/${SERVICE_REPO}.git" service-repo
          cd service-repo

          if [ ! -d "$OVERLAY_PATH" ]; then
            echo "No overlay at ${OVERLAY_PATH} in ${SERVICE_REPO}; skipping"
            exit 0
          fi

          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"

          cd "$OVERLAY_PATH"
          kustomize edit set image "${IMAGE}=${IMAGE_TAG}"
          cd "$GITHUB_WORKSPACE/service-repo"

          if git diff --exit-code "${OVERLAY_PATH}/kustomization.yaml" > /dev/null 2>&1; then
            echo "No image change, skipping commit"
            exit 0
          fi

          git add "${OVERLAY_PATH}/kustomization.yaml"
          git commit -m "chore(cd): update image to ${IMAGE_TAG}"

          # Retry push with rebase in case of concurrent runs
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            git pull --rebase origin master && git push && break
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
            [ $i -eq $MAX_RETRIES ] && { echo "Failed to push after $MAX_RETRIES attempts"; exit 1; }
          done

      - name: Notify (done)
        run: echo "✓ Finished build for ${{ matrix.service }} → ${{ steps.meta.outputs.sha_tag }}"
